name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: true

env:
  SCHEMAGEN_CONNECTION_STRING: Server=localhost,1433;Database=JojoRpgSchema;User Id=sa;Password=JojoCi_Test123!;TrustServerCertificate=True;Encrypt=False

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: JojoCi_Test123!
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: npm install
        working-directory: client

      - run: npm run build
        working-directory: client

      - run: dotnet tool restore

      - name: Generate linq2db entities
        env:
          SCHEMAGEN_CONNECTION_STRING: ${{ env.SCHEMAGEN_CONNECTION_STRING }}
        run: |
          for attempt in $(seq 1 30); do
            if dotnet run --project tools/JojoRpg.SchemaCodegen/JojoRpg.SchemaCodegen.csproj -c Release; then
              echo "Schema codegen succeeded on attempt $attempt"
              exit 0
            fi
            echo "Schema codegen failed (attempt $attempt), waiting for SQL Server..."
            sleep 3
          done
          echo "Schema codegen did not succeed in time."
          exit 1

      - name: Inject production database password
        env:
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          if [ -z "$DATABASE_PASSWORD" ]; then
            echo "Repository secret DATABASE_PASSWORD is required for CD."
            exit 1
          fi
          python3 << 'PYEOF'
          import os

          path = "src/JojoRpg.Web/appsettings.Production.json"
          with open(path, encoding="utf-8") as file:
              content = file.read()
          if "__DB_PASSWORD__" not in content:
              raise SystemExit("appsettings.Production.json is missing __DB_PASSWORD__ placeholder.")
          content = content.replace("__DB_PASSWORD__", os.environ["DATABASE_PASSWORD"])
          with open(path, "w", encoding="utf-8") as file:
              file.write(content)
          PYEOF

      - run: dotnet build --configuration Release

      - run: dotnet test --configuration Release --no-build

      - run: dotnet publish src/JojoRpg.Web/JojoRpg.Web.csproj --configuration Release --output publish

      - uses: actions/upload-artifact@v4
        with:
          name: web-publish
          path: publish/
          retention-days: 7

  deploy:
    name: Deploy to production
    needs: build
    runs-on: windows-latest
    environment:
      name: production
      url: http://jojorpg.runasp.net/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-publish
          path: publish

      - name: Deploy via MSDeploy
        shell: pwsh
        env:
          WEBDEPLOY_PASSWORD: ${{ secrets.WEBDEPLOY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WEBDEPLOY_PASSWORD)) {
            throw "Repository secret WEBDEPLOY_PASSWORD is not configured."
          }

          function Find-MsDeploy {
            @(
              "${env:ProgramFiles}\IIS\Microsoft Web Deploy V3\msdeploy.exe",
              "${env:ProgramFiles}\IIS\Microsoft Web Deploy\msdeploy.exe",
              "${env:ProgramFiles(x86)}\IIS\Microsoft Web Deploy V3\msdeploy.exe",
              "${env:ProgramFiles(x86)}\IIS\Microsoft Web Deploy\msdeploy.exe"
            ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          }

          $msdeploy = Find-MsDeploy
          if (-not $msdeploy) {
            Write-Host "Web Deploy not found on runner; installing via winget..."
            winget install --id Microsoft.WebDeploy -e --accept-source-agreements --accept-package-agreements --disable-interactivity --silent
            $msdeploy = Find-MsDeploy
          }

          if (-not $msdeploy) {
            Write-Host "winget install did not produce msdeploy.exe; falling back to MSI..."
            $msi = "$env:RUNNER_TEMP\WebDeploy.msi"
            $url = "https://download.visualstudio.microsoft.com/download/pr/e1828da1-907a-46fe-a3cf-f3b9ea1c485c/035860f3c0d2bab0458e634685648385/webdeploy_amd64_en-us.msi"
            Invoke-WebRequest -Uri $url -OutFile $msi
            $log = "$env:RUNNER_TEMP\WebDeploy-install.log"
            $install = Start-Process msiexec.exe -ArgumentList @(
              "/i", $msi,
              "/quiet", "/norestart",
              "ADDLOCAL=ALL",
              "LISTENURL=http://+:8080/MSDEPLOY2/",
              "/L*v", $log
            ) -Wait -PassThru
            if ($install.ExitCode -ne 0) {
              Get-Content $log -Tail 40
              throw "Web Deploy installer failed with exit code $($install.ExitCode)."
            }
            $msdeploy = Find-MsDeploy
          }

          if (-not $msdeploy) {
            throw "Web Deploy was not installed."
          }

          Write-Host "Using msdeploy at $msdeploy"

          $packagePath = Join-Path $env:GITHUB_WORKSPACE "publish"
          $dest = "contentPath=site75760,ComputerName=https://site75760.siteasp.net:8172/msdeploy.axd?site=site75760,UserName=site75760,Password=$env:WEBDEPLOY_PASSWORD,AuthType=Basic"

          & $msdeploy `
            -verb:sync `
            -source:contentPath="$packagePath" `
            -dest:$dest `
            -allowUntrusted `
            -enableRule:AppOffline `
            -disableLink:AppPoolExtension `
            -disableLink:ContentExtension `
            -disableLink:CertificateExtension
