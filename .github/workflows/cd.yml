name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: true

env:
  SCHEMAGEN_CONNECTION_STRING: Server=localhost,1433;Database=JojoRpgSchema;User Id=sa;Password=JojoCi_Test123!;TrustServerCertificate=True;Encrypt=False

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: JojoCi_Test123!
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: npm install
        working-directory: client

      - run: npm run build
        working-directory: client

      - run: dotnet tool restore

      - name: Generate linq2db entities
        env:
          SCHEMAGEN_CONNECTION_STRING: ${{ env.SCHEMAGEN_CONNECTION_STRING }}
        run: |
          for attempt in $(seq 1 30); do
            if dotnet run --project tools/JojoRpg.SchemaCodegen/JojoRpg.SchemaCodegen.csproj -c Release; then
              echo "Schema codegen succeeded on attempt $attempt"
              exit 0
            fi
            echo "Schema codegen failed (attempt $attempt), waiting for SQL Server..."
            sleep 3
          done
          echo "Schema codegen did not succeed in time."
          exit 1

      - name: Inject production database password
        env:
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          if [ -z "$DATABASE_PASSWORD" ]; then
            echo "Repository secret DATABASE_PASSWORD is required for CD."
            exit 1
          fi
          python3 << 'PYEOF'
          import os

          path = "src/JojoRpg.Web/appsettings.Production.json"
          with open(path, encoding="utf-8") as file:
              content = file.read()
          if "__DB_PASSWORD__" not in content:
              raise SystemExit("appsettings.Production.json is missing __DB_PASSWORD__ placeholder.")
          content = content.replace("__DB_PASSWORD__", os.environ["DATABASE_PASSWORD"])
          with open(path, "w", encoding="utf-8") as file:
              file.write(content)
          PYEOF

      - run: dotnet build --configuration Release

      - run: dotnet test --configuration Release --no-build

      - run: dotnet publish src/JojoRpg.Web/JojoRpg.Web.csproj --configuration Release --output publish

      - uses: actions/upload-artifact@v4
        with:
          name: web-publish
          path: publish/
          retention-days: 7

  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://jojorpg.runasp.net/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-publish
          path: publish

      - name: Take site offline
        run: |
          mkdir offline-only
          echo "<html><body><p>Updating...</p></body></html>" > offline-only/app_offline.htm

      - name: Upload app_offline
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: site75760.siteasp.net
          username: site75760
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: offline-only/
          server-dir: /wwwroot/
          protocol: ftps

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: site75760.siteasp.net
          username: site75760
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: publish/
          server-dir: /wwwroot/
          protocol: ftps
          log-level: verbose
